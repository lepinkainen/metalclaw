# Copy to one of (search order):
#   1. $METALCLAW_CONFIG (env override, absolute path)
#   2. ./config.yaml in the working directory (handy for dev — gitignored)
#   3. $XDG_CONFIG_HOME/metalclaw/config.yaml (or ~/.config/metalclaw/config.yaml)
# and fill in your values.

# Absolute path to your Obsidian vault. Memory files live under <vault_path>/<memory_subdir>/.
vault_path: /absolute/path/to/ObsidianVault

# Subdirectory inside the vault for Metalclaw memory files. Created if missing.
memory_subdir: Metalclaw/Memory

# Fastmail JMAP API token. Env FASTMAIL_API_TOKEN takes precedence if set.
fastmail_api_token: fmu1-xxxxxxxxxxxxxxxx

# Telegram bot token from @BotFather. Env TELEGRAM_BOT_TOKEN takes precedence if set.
telegram_bot_token: 123456:ABC-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# --- Discord ---
# Bot token from the Discord developer portal (https://discord.com/developers).
# Required scopes when inviting the bot: `bot`. Required intents (enabled in
# the dev portal): MESSAGE CONTENT INTENT (privileged), SERVER MEMBERS off,
# PRESENCE off. Env DISCORD_BOT_TOKEN takes precedence if set.
discord_bot_token: REPLACE_WITH_DISCORD_BOT_TOKEN
# Channel IDs that the bot treats as dedicated chat threads — it replies to
# every message in these channels (no @mention required), and each channel
# keeps its own conversation context. DMs always behave this way too. Other
# guild channels need an @mention or a reply to the bot's own message.
# Right-click a channel in Discord with developer mode on to copy its ID.
discord_chat_channels: []
# Channel ID where Discord heartbeats post. Required for any
# `heartbeat-discord*.md` file under the memory dir to deliver. Set to a
# server channel ID for shared visibility, or to a DM channel ID for private.
# discord_heartbeat_channel: 1000000000000000000

# Which LLM provider drives the bot. One of: ollama | openai | anthropic.
# Default: ollama (local). Use openai or anthropic for VPS deployments.
provider: ollama

# --- Ollama (local) ---
# Optional: override Ollama endpoint. Env OLLAMA_URL takes precedence.
ollama_url: http://localhost:11434/api/chat
# Ollama model name. Used only when provider == ollama.
model: gemma4:latest

# --- OpenAI ---
# Used only when provider == openai (or as escalation target). Env
# OPENAI_API_KEY takes precedence over the yaml value.
openai_api_key: sk-...
openai_model: gpt-4o-mini

# --- Anthropic ---
# Used only when provider == anthropic (or as escalation target). Env
# ANTHROPIC_API_KEY takes precedence.
anthropic_api_key: sk-ant-...
anthropic_model: claude-haiku-4-5

# --- Escalation: refer hard questions to a Big Boy cloud model ---
# When enabled and the active provider is local, the model can call the
# `escalate_to_big_model` tool, and the user can type `/big <query>` to
# bypass the local model entirely. The escalation provider needs its key
# set (above). escalation_model defaults to the configured per-provider
# model if omitted.
escalation_enabled: false
escalation_provider: anthropic
escalation_model: claude-opus-4-7

# Heartbeat — proactive scheduled checks. Drop a heartbeat-<scope>.md file in
# <vault_path>/<memory_subdir>/ to opt that scope in.
heartbeat_enabled: true
heartbeat_interval_seconds: 1800
# Optional [start_hour, end_hour] (24h local time). Outside this window, ticks are skipped.
# heartbeat_active_hours: [8, 22]

# Allow `/add-tool` (live) and `/self-edit` (CLI) to spawn `claude -p` and
# mutate the bot's own source. Default true. Set to false on deployments
# where Telegram or Discord might be reachable by anyone other than you —
# `/add-tool` is reachable from those frontends and registers arbitrary new
# Python in `tools/<slug>.py`. CLI `/self-edit` is gated by the same flag.
allow_self_modification: true

# Glob patterns (relative to vault_path) excluded from /search and the
# search_vault tool. Defaults to empty — full vault is searched. ripgrep
# already skips hidden dirs (.obsidian, .trash) and respects .gitignore, so
# you typically only need this for big archive directories you don't want
# polluting results.
# vault_search_excludes:
#   - "Notion Export/**"
#   - "Journal/**"
